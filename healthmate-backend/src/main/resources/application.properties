spring.application.name=healthmate-backend

# MongoDB Configuration
# spring.data.mongodb.uri=mongodb://localhost:27017/healthmate
# MongoDB Atlas Cloud Connection
spring.data.mongodb.uri=${MONGODB_URI}
# If using Atlas, replace the URI above with your connection string

# Server Configuration
server.port=8080
server.tomcat.max-http-post-size=5MB

# Logging
logging.level.org.springframework.security=DEBUG

# JWT Configuration (Secret Key should be strong and kept safe)
# This is a sample 256-bit key for demonstration. In prod, use properties or environment variables.
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=86400000 
# 24 hours

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=healthmatefitness@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile, email
